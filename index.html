<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RWA Free Batches - SPIDY UNIVERSE 🔥</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 10px;
        }
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #30363d;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, #00e5ff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #8b949e;
            font-size: 14px;
            margin-top: 5px;
        }
        .iframe-container {
            width: 100%;
            height: calc(100vh - 150px);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #30363d;
            background: #161b22;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer {
            text-align: center;
            padding: 15px;
            color: #8b949e;
            font-size: 13px;
            border-top: 1px solid #30363d;
            margin-top: 15px;
        }
        .footer a {
            color: #00e5ff;
            text-decoration: none;
        }
        .badge {
            background: #238636;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin: 5px;
        }
        .badge.blue {
            background: #1f6feb;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 20px; }
            .iframe-container { height: calc(100vh - 130px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 RWA Free Batches</h1>
        <p>Powered by <strong style="color:#00e5ff;">SPIDY UNIVERSE</strong></p>
        <div>
            <span class="badge">🔓 ALL FREE</span>
            <span class="badge blue">📚 500+ Batches</span>
        </div>
    </div>
    
    <div class="iframe-container">
        <iframe src="https://spidyuniverserwa.vercel.app/" allowfullscreen></iframe>
    </div>
    
    <div class="footer">
        <p>⚡ Direct from <a href="https://spidyuniverserwa.vercel.app/" target="_blank">SPIDY UNIVERSE</a> • Made with ❤️ for students</p>
    </div>
</body>
</html>
